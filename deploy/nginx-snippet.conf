# Nginx location block for Screen-Export sub-website
#
# Paste this block inside your existing `server { ... }` block.
# Place it BEFORE any catch-all location blocks (e.g. `location / { ... }`).
#
# Sub-path: /tools/screenshot-export
# Backend:  http://127.0.0.1:8001 (systemd service screen-export.service)

location /tools/screenshot-export/ {
    proxy_pass         http://127.0.0.1:8001/;
    proxy_http_version 1.1;

    # Required for SSE (Server-Sent Events / progress stream)
    proxy_set_header   Connection         "";
    proxy_buffering    off;
    proxy_cache        off;

    # Standard proxy headers
    proxy_set_header   Host               $host;
    proxy_set_header   X-Real-IP          $remote_addr;
    proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto  $scheme;

    # Allow large video file uploads (adjust as needed)
    client_max_body_size 2g;

    # Longer timeout for video processing jobs
    proxy_read_timeout   600s;
    proxy_send_timeout   600s;
}
