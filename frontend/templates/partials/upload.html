<!-- ── 上传区 ──────────────────────────────────────── -->
<section class="bg-white rounded-2xl border border-slate-200 shadow-sm p-6">
  <h2 class="text-base font-semibold text-slate-700 mb-4">上传视频</h2>
  <div id="drop-zone"
    class="border-2 border-dashed border-slate-300 rounded-xl p-10 text-center
           cursor-pointer transition-colors hover:border-indigo-400 hover:bg-indigo-50/50">
    <input id="file-input" type="file" accept="video/*" class="hidden" />
    <svg class="w-10 h-10 mx-auto mb-3 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
        d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
    </svg>
    <p class="text-slate-500 text-sm">拖拽视频到此处，或 <span class="text-indigo-600 font-medium">点击选择</span></p>
    <p id="file-label" class="mt-2 text-xs text-slate-400">支持 mp4、mov、avi、mkv、webm</p>
  </div>
</section>
