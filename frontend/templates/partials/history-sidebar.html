<!-- ── 历史记录侧栏 ─────────────────────────────────────── -->
<div id="history-overlay"
  class="fixed inset-0 bg-black/30 z-40 hidden"
  onclick="closeHistory()"></div>

<aside id="history-panel"
  class="fixed top-0 right-0 h-full w-full max-w-xl bg-white shadow-2xl z-50
         translate-x-full transition-transform duration-300 flex flex-col">
  <div class="flex items-center justify-between px-6 py-5 border-b border-slate-200">
    <h2 class="text-lg font-bold text-slate-800">历史记录</h2>
    <button onclick="closeHistory()"
      class="p-2 rounded-lg hover:bg-slate-100 transition-colors text-slate-500">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>
  </div>
  <div id="history-list" class="flex-1 overflow-y-auto divide-y divide-slate-100"></div>
</aside>
