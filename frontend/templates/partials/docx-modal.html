<!-- ── DOCX 完成弹窗 ──────────────────────────────────── -->
<div id="docx-modal" class="fixed inset-0 bg-black/50 z-[60] hidden items-center justify-center"
  onclick="closeDocxModal(event)">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-3xl mx-4 overflow-hidden"
    onclick="event.stopPropagation()">
    <!-- 顶部 -->
    <div class="px-6 py-5 border-b border-slate-100 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 bg-emerald-100 rounded-full flex items-center justify-center shrink-0">
          <svg class="w-5 h-5 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
          </svg>
        </div>
        <div>
          <h3 class="text-base font-bold text-slate-800">DOCX 已生成</h3>
          <p id="docx-modal-info" class="text-xs text-slate-400 mt-0.5"></p>
        </div>
      </div>
      <button onclick="closeDocxModal()" title="关闭" class="p-1.5 rounded-lg hover:bg-slate-100 text-slate-400 transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>
    <!-- DOCX 内容预览 -->
    <div id="docx-preview-container" class="px-4 py-3 bg-slate-100 overflow-y-auto" style="height:520px">
      <div id="docx-preview-loading" class="flex flex-col items-center justify-center h-full gap-3 text-slate-400">
        <svg class="w-8 h-8 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
        </svg>
        <span class="text-sm">正在加载文档预览…</span>
      </div>
      <div id="docx-preview-error" class="hidden flex-col items-center justify-center h-full gap-2 text-red-400">
        <span class="text-sm">文档预览加载失败，请直接下载查看</span>
      </div>
      <div id="docx-preview-body" class="hidden"></div>
    </div>
    <!-- 操作按钮 -->
    <div class="px-6 pb-5 flex gap-3">
      <button onclick="closeDocxModal()"
        class="flex-1 px-4 py-2.5 rounded-xl border border-slate-200 text-slate-600 text-sm font-medium
               hover:bg-slate-50 transition-colors">
        关闭
      </button>
      <button id="docx-modal-dl"
        class="flex-1 flex items-center justify-center gap-2 px-4 py-2.5 rounded-xl
               bg-emerald-600 hover:bg-emerald-700 text-white text-sm font-semibold
               transition-colors shadow-sm shadow-emerald-200">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
        </svg>
        下载 DOCX
      </button>
    </div>
  </div>
</div>
